name: Make GHCR packages public

# 仅把已存在的 GHCR 包翻成公开，不重新构建镜像。
# 为什么需要它：GHCR 包默认私有，且「包可见性」与仓库是否 public 无关；
# GITHUB_TOKEN（Actions 机器人）和协作者 PAT 都翻不动 dreamlark 名下的包，
# 只有包所有者（dreamlark）自己的、带 write:packages 作用域的 PAT 才行。
#
# 用法（可选自动化）：
#   1. 用 dreamlark 账号生成一个 PAT，勾选 write:packages 作用域；
#   2. 在仓库 Settings → Secrets → Actions 添加仓库密钥 PACKAGES_PAT = 该 PAT；
#   3. 本工作流检测到该密钥即用它把三个包翻成 Public；未设置则跳过并提示。
# 也可直接在 GitHub 网页仓库的 Packages 设置里手动翻 Public（一次性，更省事）。
on:
  push:
    paths:
      - '.github/workflows/make-public.yml'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  public:
    runs-on: ubuntu-latest
    # 没有 PACKAGES_PAT 就不运行，避免假成功误导。
    if: ${{ secrets.PACKAGES_PAT != '' }}
    steps:
      - name: Flip visibility to public (via owner PAT)
        env:
          GH_TOKEN: ${{ secrets.PACKAGES_PAT }}
        run: |
          for pkg in dm-life-engine dm-life-server dm-life-web; do
            echo ">> making $pkg public"
            if gh api -X PATCH "user/packages/container/$pkg/visibility" -f visibility=public; then
              echo "   ok: $pkg -> public"
            else
              echo "   FAILED: $pkg (检查 PACKAGES_PAT 是否为 dreamlark 账号且含 write:packages)"
            fi
          done
          echo "=== done ==="
