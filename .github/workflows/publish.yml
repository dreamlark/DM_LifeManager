name: Publish Images to GHCR

# 每次推送到 main 时，自动把三个服务构建为 Docker 镜像并推送到
# GitHub Container Registry（ghcr.io/dreamlark/...），且自动设为公开，
# 以便家庭 NAS（fnOS 等）无需 git、无需编译，直接拉取运行。
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push engine
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./packages/engine/Dockerfile
          push: true
          tags: |
            ghcr.io/dreamlark/dm-life-engine:latest
            ghcr.io/dreamlark/dm-life-engine:sha-${{ github.sha }}

      - name: Build & push server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./packages/server/Dockerfile
          push: true
          tags: |
            ghcr.io/dreamlark/dm-life-server:latest
            ghcr.io/dreamlark/dm-life-server:sha-${{ github.sha }}

      - name: Build & push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./packages/web-collab/Dockerfile
          push: true
          tags: |
            ghcr.io/dreamlark/dm-life-web:latest
            ghcr.io/dreamlark/dm-life-web:sha-${{ github.sha }}

      # 自动把三个包设为公开，使 fnOS 等可匿名拉取（无需登录 GHCR）。
      # 包刚推送后可能短暂不可见，故带重试。
      - name: Make packages public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          for pkg in dm-life-engine dm-life-server dm-life-web; do
            for i in $(seq 1 12); do
              if gh api -X PATCH "/user/packages/container/$pkg/visibility" -f visibility=public >/dev/null 2>&1; then
                echo "ok: $pkg -> public"
                break
              fi
              echo "retry $i: $pkg not yet visible, waiting..."
              sleep 8
            done
          done
