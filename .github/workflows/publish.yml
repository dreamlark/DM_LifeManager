name: Publish Images to GHCR

# 每次推送到 main 时，自动把三个服务构建为 Docker 镜像并推送到
# GitHub Container Registry（ghcr.io/dreamlark/...），且自动设为公开，
# 以便家庭 NAS（fnOS 等）无需 git、无需编译，直接匿名拉取运行。
on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - '.github/workflows/publish.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push engine
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./packages/engine/Dockerfile
          push: true
          tags: |
            ghcr.io/dreamlark/dm-life-engine:latest
            ghcr.io/dreamlark/dm-life-engine:sha-${{ github.sha }}

      - name: Build & push server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./packages/server/Dockerfile
          push: true
          tags: |
            ghcr.io/dreamlark/dm-life-server:latest
            ghcr.io/dreamlark/dm-life-server:sha-${{ github.sha }}

      - name: Build & push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./packages/web-collab/Dockerfile
          push: true
          tags: |
            ghcr.io/dreamlark/dm-life-web:latest
            ghcr.io/dreamlark/dm-life-web:sha-${{ github.sha }}

      # 精简部署：单镜像 All-in-One（含 engine + server + 前端 + caddy，零必填配置）。
      # 对应 docs/redesign/ 最终方案 P1。
      - name: Build & push all-in-one
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.allinone
          push: true
          tags: |
            ghcr.io/dreamlark/dm-life:latest
            ghcr.io/dreamlark/dm-life:sha-${{ github.sha }}

      # 注：GHCR 包默认是私有的，且「包可见性」与仓库 public 无关。
      # GITHUB_TOKEN（Actions 机器人）与协作者 PAT 都无法翻转 dreamlark 名下
      # 包的可见性，故此处不自动翻公开，避免“假成功”。
      # 首次发布后，请用 dreamlark 账号在仓库 Packages 设置里把三个包翻成
      # Public（一次性，之后所有标签都公开）；或给 fnOS 登录 ghcr.io 拉私有
      # （用带 read:packages 的 PAT）。
      # 若希望自动化：在仓库 Secrets 中添加 PACKAGES_PAT（dreamlark 账号、
      # 作用域 write:packages），见 .github/workflows/make-public.yml。
