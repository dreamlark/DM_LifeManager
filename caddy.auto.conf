# dm-life All-in-One 内置 Caddy 配置（容器内部，:8080）
# 上游均为本容器内的子进程：engine(14570) / server(4100) / 静态前端(dist)
{
  admin off
}

:8080 {
  encode gzip

  # 静态前端（web-collab 构建产物）
  root * /app/packages/web-collab/dist
  try_files {path} /index.html

  # 本地引擎（个人模式 / SSE）：剥离 /engine 前缀 → 127.0.0.1:14570
  handle_path /engine/* {
    reverse_proxy 127.0.0.1:14570
  }

  # 协作后端 tRPC
  handle /trpc* {
    reverse_proxy 127.0.0.1:4100
  }
  handle /api/* {
    reverse_proxy 127.0.0.1:4100
  }
  handle /health* {
    reverse_proxy 127.0.0.1:4100
  }
  handle /ready* {
    reverse_proxy 127.0.0.1:4100
  }
  handle /ws* {
    reverse_proxy 127.0.0.1:4100
  }

  # 默认：前端静态站（SPA 回退由 try_files 处理）
  handle {
    file_server
  }
}

# ===== 自动 HTTPS（P3 启用，需 caddy 能获取证书）=====
# 检测到 Tailscale 时：`tailscale cert 机器名.ts.net` 生成证书后，把上面 :8080 块替换为：
