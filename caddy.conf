{
  admin off
}

# ===== HTTP 版（默认，立即可用，适配 Tailscale/LAN）=====
# 容器 caddy 监听 80，compose 把宿主机 8080 映射进来，故站点块用 :80。
# Tailscale 的 WireGuard 已端到端加密，传输层等同安全；浏览器虽显示“不安全”，
# 但流量已被加密，家庭/跨设备访问足够。
:80 {
  encode gzip

  # 本地引擎（个人模式 / SSE）：剥离 /engine 前缀 → engine:14570
  handle_path /engine/* {
    reverse_proxy engine:14570
  }

  # 协作后端 tRPC（保留 /trpc 前缀）
  handle /trpc* {
    reverse_proxy server:4100
  }

  # 版本接口
  handle /api/* {
    reverse_proxy server:4100
  }

  # 健康检查（前端 BackendGate 探测）
  handle /health* {
    reverse_proxy server:4100
  }

  # 就绪探测
  handle /ready* {
    reverse_proxy server:4100
  }

  # 实时 WebSocket 网关
  handle /ws* {
    reverse_proxy server:4100
  }

  # 默认：前端静态站
  handle {
    reverse_proxy frontend:80
  }
}

# ===== HTTPS 版（可选，需先 `tailscale cert`）=====
# 1) Tailscale 管理后台开启 HTTPS（等几分钟全局生效）
# 2) NAS 终端执行：tailscale cert 你的机器名.ts.net
#    （生成 你的机器名.ts.net.crt / .key，放到 docker/certs/ 目录）
# 3) 把下面的站点块替换上面的 :80 块，并在 compose 的 caddy 段加：
#      ports:
#        - "443:443"
#      volumes:
#        - /vol1/1000/.../docker/certs:/certs:ro
# 4) 访问 https://你的机器名.ts.net （无需端口号）
#
# 你的机器名.ts.net {
#   encode gzip
#   tls /certs/你的机器名.ts.net.crt /certs/你的机器名.ts.net.key
#
#   handle_path /engine/* {
#     reverse_proxy engine:14570
#   }
#   handle /trpc* {
#     reverse_proxy server:4100
#   }
#   handle /api/* {
#     reverse_proxy server:4100
#   }
#   handle /health* {
#     reverse_proxy server:4100
#   }
#   handle /ready* {
#     reverse_proxy server:4100
#   }
#   handle /ws* {
#     reverse_proxy server:4100
#   }
#   handle {
#     reverse_proxy frontend:80
#   }
# }
