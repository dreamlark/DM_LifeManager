# fnOS / Docker host 部署 —— 基于最新代码 (security/quality hardening, commit 589136f)
#
# 镜像：ghcr.io/dreamlark/dm-life-{engine,server,web}
#   - 已钉固到不可变标签 :sha-589136f（供应链安全 N2 要求，禁止用 :latest）。
#   - 589136f 是最新一次成功构建的提交；若之后又有新提交，请在 GitHub
#     Packages 里查对应 :sha-<commit> 再替换下面三处 image 标签。
#   - 镜像默认【私有】：首次需 `docker login ghcr.io`（用户名=GitHub 登录名，
#     密码=PAT，作用域必须勾 read:packages；旧的 repo/workflow 类 PAT 拉不了包）。
#     或把三个包在 GitHub 网页手动设为 Public（一次性）。
#
# 用法（fnOS 容器 → 项目/Compose 粘贴本文件）：
#   1. 同目录准备 caddy.conf（见交付的 caddy.conf）和 .env（见 .env.example）。
#   2. 在 NAS 终端先 `docker login ghcr.io`。
#   3. 启动项目。
# 访问：http://<NAS 局域网IP 或 Tailscale IP>:8080
#   （Tailscale 的 WireGuard 已端到端加密，HTTP 在传输层等同安全；
#    想要浏览器绿锁见 caddy.conf 里的 HTTPS 变体，需先 `tailscale cert`）
#
# 注意（N4 非 root 容器）：engine/server 容器内以 uid 1000(node) 运行，
# 会向 ./data/engine、./data/server 写库。若启动后 engine/server 报
# 权限错误(EACCES)，在 NAS 终端执行：
#   chown -R 1000:1000 /vol1/1000/2_工作_学习/1_创业/DM.006_DM_lifemanager/docker/data
# 再 `docker compose -p dm_life up -d` 即可。

services:
  engine:
    image: ghcr.io/dreamlark/dm-life-engine:sha-589136f
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=14570
      - HOST=0.0.0.0
      - DM_LIFE_DATA_DIR=/data
      # P0-2：engine 启用令牌后只接受携带正确令牌的请求（缺省 fail-closed）。
      - ENGINE_API_TOKEN=${ENGINE_API_TOKEN:?请在 .env 中设置 ENGINE_API_TOKEN}
    volumes:
      - ./data/engine:/data
    expose:
      - "14570"

  server:
    image: ghcr.io/dreamlark/dm-life-server:sha-589136f
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=4100
      - PGLITE_DIR=/data
      - CORS_ORIGIN=*
      # 安全必填：强随机 JWT 签名密钥，缺失则 server 启动即失败。
      - JWT_SECRET=${JWT_SECRET:?请在 .env 中设置 JWT_SECRET}
      # 与 engine 的 ENGINE_API_TOKEN 保持一致。
      - ENGINE_API_TOKEN=${ENGINE_API_TOKEN:?请在 .env 中设置 ENGINE_API_TOKEN}
    volumes:
      - ./data/server:/data
    expose:
      - "4100"

  frontend:
    image: ghcr.io/dreamlark/dm-life-web:sha-589136f
    restart: unless-stopped
    expose:
      - "80"

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      - engine
      - server
      - frontend
    ports:
      - "8080:80"
    volumes:
      # 绝对路径，确保 fnOS 解析到真实文件（相对路径在 fnOS 下常被建占位目录）。
      - /vol1/1000/2_工作_学习/1_创业/DM.006_DM_lifemanager/docker/caddy.conf:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
