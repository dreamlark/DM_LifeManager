services:
  dm-life:
    build: .
    image: dm-life:latest
    container_name: dm-life
    restart: unless-stopped
    ports:
      - "${DM_LIFE_PORT:-8080}:3000"
    volumes:
      - ${DATA_DIR:-./data}:/data
      # Drop-in Module: eigenes Modul nach modules/<name>/ ablegen
      - ${MODULES_DIR:-./modules}:/app/modules
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DB_PATH=/data/dm-life.db
      - DATA_DIR=/data
      # SESSION_SECURE: true bei HTTPS-Proxy, false bei direktem HTTP
      - SESSION_SECURE=${SESSION_SECURE:-false}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
